<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cốc Cốc Actions</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- The backdrop overlay -->
    <div id="backdrop">
        <!-- Floating launcher container -->
        <div id="launcher">
            
            <!-- Chain Mode Header (Hidden by default) -->
            <div id="chain-header" class="hidden">
                <div class="chain-track-container">
                    <div class="chain-track" id="chain-track">
                        <!-- Action blocks inserted here -->
                    </div>
                </div>
                <button id="save-macro-btn" class="icon-btn" title="Save as Macro">
                    <i data-lucide="save"></i>
                </button>
            </div>

            <!-- Top input area -->
            <div id="input-area">
                <i data-lucide="search" class="search-icon" id="main-search-icon"></i>
                <div id="parameter-pills-container" class="hidden">
                    <!-- parameter pills injected here -->
                </div>
                <input type="text" id="search-input" placeholder="Search websites, browser features, settings, and more" autocomplete="off" spellcheck="false" />
                <button id="mic-btn" class="icon-btn" title="Voice Input">
                    <i data-lucide="mic"></i>
                </button>
            </div>

            <!-- Breadcrumbs for subcommands -->
            <div id="breadcrumbs-container" class="hidden">
                <div id="breadcrumbs">
                    <span id="bc-root" class="bc-item">Root</span>
                    <i data-lucide="chevron-right" class="bc-sep"></i>
                    <span id="bc-current" class="bc-item active">Current</span>
                </div>
            </div>

            <!-- Suggestion list -->
            <div id="suggestion-list-container">
                <div id="suggestion-list">
                    <!-- dynamically generated -->
                </div>
            </div>

            <!-- Footer area -->
            <div id="footer">
                <div class="footer-left">
                    <div class="chain-toggle">
                        <label class="switch">
                          <input type="checkbox" id="chain-mode-toggle">
                          <span class="slider round"></span>
                        </label>
                        <span>Chuỗi lệnh</span>
                    </div>
                </div>
                <div class="footer-right">
                    <span class="hint"><kbd>Ctrl</kbd> <kbd>E</kbd> để chỉnh sửa</span>
                    <span class="hint"><kbd>↵ Enter</kbd> để thực thi</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Command</h3>
                <button id="close-modal-btn" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" />
                </div>
                <div class="form-group">
                    <label for="edit-aliases">Aliases (comma separated)</label>
                    <input type="text" id="edit-aliases" />
                </div>
                <div class="form-group">
                    <label for="edit-shortcut">Shortcut</label>
                    <input type="text" id="edit-shortcut" placeholder="e.g. Ctrl T" />
                </div>
            </div>
            <div class="modal-footer" id="modal-footer">
                <div class="footer-left-actions">
                    <button id="edit-macro-steps-btn" class="secondary-btn hidden">Edit Steps</button>
                    <button id="delete-macro-btn" class="danger-btn hidden">Delete</button>
                </div>
                <button id="save-command-btn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Chain Item Modal -->
    <div id="chain-item-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Action Details</h3>
                <button id="close-chain-item-btn" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body" id="chain-item-details">
                <!-- details injected here -->
            </div>
            <div class="modal-footer" style="justify-content: flex-end;">
                <button id="delete-chain-item-btn" class="danger-btn">Delete from Chain</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
